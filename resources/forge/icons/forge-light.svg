    C346 394, 306 420, 256 420
    C206 420, 166 394, 166 344
    C166 300, 203 250, 256 186Z
  " fill="url(#inner-flame)" opacity="0.85"/>

  <!-- Hot core glow -->
  <ellipse cx="256" cy="356" rx="42" ry="46" fill="#FAEEDA" opacity="0.4"/>
</svg>

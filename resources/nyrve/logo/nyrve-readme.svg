<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220">
  <defs>
    <linearGradient id="outer-flame" x1="0.3" y1="1" x2="0.7" y2="0">
      <stop offset="0%" stop-color="#993C1D"/>
      <stop offset="40%" stop-color="#D85A30"/>
      <stop offset="70%" stop-color="#EF9F27"/>
      <stop offset="100%" stop-color="#FAC775"/>
    </linearGradient>
    <linearGradient id="inner-flame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#EF9F27"/>
      <stop offset="60%" stop-color="#FAC775"/>
      <stop offset="100%" stop-color="#FAEEDA"/>
    </linearGradient>
  </defs>

  <!-- Flame icon centered at x=80 -->
  <g transform="translate(80, 100) scale(0.38)">
    <path d="M0 -120 C50 -70, 90 -5, 90 45 C90 90, 50 120, 0 120 C-50 120, -90 90, -90 45 C-90 -5, -50 -70, 0 -120Z" fill="url(#outer-flame)"/>
    <path d="M0 -58 C25 -27, 45 8, 45 38 C45 62, 25 78, 0 78 C-25 78, -45 62, -45 38 C-45 8, -25 -27, 0 -58Z" fill="url(#inner-flame)" opacity="0.85"/>
    <ellipse cx="0" cy="45" rx="20" ry="22" fill="#FAEEDA" opacity="0.4"/>
  </g>

  <!-- FORGE wordmark -->
  <text
    x="140"
    y="118"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="72"
    font-weight="600"
    letter-spacing="6"
    fill="#D85A30"
  >FORGE</text>

  <!-- Tagline -->
  <text
    x="144"
    y="152"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="16"
    font-weight="400"
    letter-spacing="4"
    fill="#888780"
  >AI CODE EDITOR</text>
</svg>
